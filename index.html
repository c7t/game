<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Button Platformer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body {
  background:#04040f;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New', monospace;
  touch-action:none;
  user-select:none; -webkit-user-select:none;
}
canvas { display:block; cursor:pointer; touch-action:none; image-rendering:pixelated }
#tip { margin-top:10px; color:rgba(255,255,255,0.22); font:12px 'Courier New',monospace; letter-spacing:2px; text-transform:uppercase }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip">SPACE · CLICK · TAP</div>
<script>
// ═══════════════════════════════════════════════════════════
//  ONE BUTTON PLATFORMER  —  vertical camera edition
//
//  Camera system: asymmetric dead-zone + spring + look-ahead
//    · Dead zone keeps player in a comfortable band
//    · Zone is TIGHTER below when falling (fall pulls cam faster)
//    · Subtle look-ahead bias pre-tilts toward upcoming terrain
// ═══════════════════════════════════════════════════════════

const cv = document.getElementById('c'), cx = cv.getContext('2d')
const W = 800, H = 440                // logical game space — physics lives here
const PIXEL_SCALE = 3                 // canvas is 3× lower-res → chunky pixels
const CW = Math.round(W/PIXEL_SCALE)  // 267 canvas px wide
const CH = Math.round(H/PIXEL_SCALE)  // 147 canvas px tall
cv.width = CW; cv.height = CH

function scaleCanvas() {
  const s = Math.min(window.innerWidth/CW, (window.innerHeight-40)/CH)
  cv.style.width  = (CW*s)+'px'
  cv.style.height = (CH*s)+'px'
}
scaleCanvas()
window.addEventListener('resize', () => { scaleCanvas(); setTimeout(scaleCanvas, 150) })
// Block long-press context menu on mobile
window.addEventListener('contextmenu', e => e.preventDefault())

// ── Physics ─────────────────────────────────────────────────
const SPD  = 4        // px/frame auto-run
const JVY  = -14      // jump impulse (negative = up)
const GRAV = 0.58     // px/frame²
const MXVY = 18       // max fall speed
const PLW  = 24       // player width
const PLH  = 32       // player height
const PTH  = 20       // platform thickness

// Physics check:
//   peak height  ≈ 14²/(2×0.58) ≈ 169 px
//   air time     ≈ 2×14/0.58   ≈  48 frames
//   jump reach   ≈ 4×48         ≈ 192 px

// ── World bounds (large—camera follows, not clipped to screen) ─
const YMIN = -2000
const YMAX =  4000

// ── Camera config ────────────────────────────────────────────
// camY = world-Y of the top edge of the screen
// screenY = worldY - camY

// Dead zone in screen coords (player CENTER must stay inside)
// Asymmetric: tighter below when falling so landing zone appears faster
const DZ_TOP      = H * 0.26   // upper boundary
const DZ_BOT_IDLE = H * 0.60   // lower boundary (ground/rising)
const DZ_BOT_FALL = H * 0.45   // lower boundary (falling fast—tighter!)
const CAM_SPRING  = 0.060      // spring constant
const CAM_DAMP    = 0.82       // velocity damping per frame
const LOOK_STR    = 0.0055     // terrain look-ahead influence strength
const LOOK_LO     = 80         // look-ahead start offset (px ahead of player)
const LOOK_HI     = 520        // look-ahead end offset

// ── Palette per terrain type ─────────────────────────────────
const COL = {
  flat:      { b:'#1e4480', s:'#3470c0', t:'#70b0ff' },
  step_up:   { b:'#1e5c1a', s:'#38a030', t:'#80ff60' },
  gap:       { b:'#581890', s:'#9030d0', t:'#cc70ff' },
  descend:   { b:'#6a3c0e', s:'#c07018', t:'#ffb84a' },   // walk/fall descent (no jump)
  jump_down: { b:'#0a4050', s:'#1888b8', t:'#30d8ff' },   // must jump to reach lower platform
}
const SIGN = { flat:null, step_up:'▲ JUMP', gap:'▶▶ JUMP', descend:'⬇ DROP', jump_down:'↗ JUMP' }
const NAME = { flat:'FLAT', step_up:'STEP UP', gap:'GAP', descend:'DESCEND', jump_down:'JUMP DOWN' }

// ── Difficulty system ─────────────────────────────────────────
// All knobs are smooth functions of `score`, using staggered ramp windows
// so changes never pile up simultaneously.
//
//  score    0 → 400   flat bias fades (breathing room disappears)
//  score    0 → 700   speed ramps  4 → 7.5 px/frame
//  score   80 → 600   run-up width shrinks (less warning)
//  score  150 → 600   type colors fade to neutral (no visual telegraph)
//  score  150 → 900   gap / step / fall sizes grow
//  labels             per-type: hidden after 2 successful landings each

function ss(x, lo, hi) {          // smoothstep: ease-in/out ramp 0→1
  const t = Math.max(0, Math.min(1, (x-lo)/(hi-lo)))
  return t*t*(3-2*t)
}
function lrp(a, b, t) { return a + (b-a)*t }

// Exact RGB lerp for platform color — guarantees all types converge to
// the identical neutral pixel value at colorFade=1 (no bleed-through).
const NEUTRAL_B = [100, 125, 175]   // body neutral
const NEUTRAL_S = [150, 175, 230]   // shine neutral (slightly brighter)
function hexRgb(h) {
  const n = parseInt(h.slice(1), 16)
  return [(n>>16)&255, (n>>8)&255, n&255]
}
function lerpCol(a, b, t) {
  return `rgb(${lrp(a[0],b[0],t)|0},${lrp(a[1],b[1],t)|0},${lrp(a[2],b[2],t)|0})`
}

function getDiff() {
  const s = score

  // ── Phase 1: Spacing squeeze  (score 0 → 180, speed locked at 4) ──
  // Flat bias, run-up width, and landing widths tighten while the world
  // is still colourful. Gaps/drops grow so player learns harder geometry
  // at slow speed before the colour cues disappear.
  const p1       = ss(s, 0, 180)
  const flatBias = Math.round(lrp(3, 0, ss(s, 0, 120)))
  const runLo    = lrp(180,  45, p1)   // run-up min: 180 → 45  (very little warning)
  const runHi    = lrp(260,  80, p1)   // run-up max: 260 → 80
  const landLo   = lrp(190, 120, p1)   // landing min: 190 → 120 (tighter target)
  const landHi   = lrp(270, 170, p1)   // landing max: 270 → 170
  const gapLo    = lrp( 70, 130, ss(s, 60, 180))  // gap min: 70 → 130
  const gapHi    = lrp(110, 180, ss(s, 60, 180))  // gap max: 110 → 180  (reach ≈ 192)
  const stepHi   = lrp( 90, 130, ss(s, 60, 180))
  const dropHi   = lrp(110, 170, ss(s, 60, 180))
  const fallHi   = lrp(180, 280, ss(s, 60, 180))

  // ── Phase 2: Colour fade  (score 180 → 220, ~10 s at speed 4) ──
  const colorFade = ss(s, 180, 220)

  // ── Phase 3a: First speed ramp  (score 260 → 800) — 4 → 7.5 px/frame ──
  // ── Phase 3b: Second speed ramp (score 800 → 1400) — 7.5 → 14 px/frame ──
  // Each ramp is roughly the same ×1.875 factor and similar wall-clock duration.
  const speed = s < 800
    ? lrp(4,   7.5, ss(s, 260,  800))
    : lrp(7.5, 14,  ss(s, 800, 1400))

  return { speed, gapLo, gapHi, stepHi, dropHi, fallHi,
           runLo, runHi, landLo, landHi, flatBias, colorFade }
}

// Per-type "successful landing" counters.
// Label for a type hides permanently once it's been cleared twice.
const typeClears = { step_up:0, gap:0, descend:0, jump_down:0 }
function showLabel(type) { return (typeClears[type]||0) < 2 }

// ── State ────────────────────────────────────────────────────
let plats=[], signs=[], zones=[], particles=[]
let camX=0, camY=0, camYVel=0
let gx=0, gy=0
let pl={}, score=0, scoreBase=0, best=0
let coyote=0, jbuf=0
let tick=0, mode='title', lastType='flat'
let lastGroundY=0   // world-Y of last surface the player stood on

// ── Init ─────────────────────────────────────────────────────
function init() {
  plats=[]; signs=[]; zones=[]; particles=[]
  tick=0; score=0; gx=0; camX=0; lastType='flat'
  // ?score=N or ?diff=N lets you start at a higher difficulty for tuning
  const urlScore = parseInt(new URLSearchParams(location.search).get('score') ?? new URLSearchParams(location.search).get('diff') ?? '0')
  scoreBase = urlScore > 0 ? urlScore : 0
  score = scoreBase
  Object.keys(typeClears).forEach(k => typeClears[k]=0)
  gy = 260   // starting world-Y for ground

  addP(0, gy, 460, 'flat')
  gx = 460

  pl = { wx:200, y:gy-PLH, vy:0, on:true }
  lastGroundY = gy   // track last known ground surface

  // Position camera so player starts at 38% from top
  camY    = pl.y + PLH/2 - H*0.38
  camYVel = 0
  coyote=0; jbuf=0

  while (gx-camX < W*4) gen()
}

function addP(x,y,w,t) { plats.push({x,y,w,t}) }
function addS(x,y,t)   { const s=SIGN[t]; if(s) signs.push({x,y,s,t}) }
function addZ(x,y,w,h,t){ zones.push({x,y,w,h,t}) }

// Simulates exact horizontal travel during a free-fall of `dh` world units,
// starting from vy=0, using the game's own gravity + MXVY clamp.
const LAND_MARGIN = 28   // px of platform guaranteed left of landing point
function fallLand(dh, spd) {
  let vy=0, y=0, t=0
  while (y < dh && t < 400) { vy=Math.min(vy+GRAV, MXVY); y+=vy; t++ }
  return t * spd
}

// Same but player starts with a full jump impulse (JVY) — how far they reach
// when jumping from flat ground and landing `dh` units below start.
function jumpDownLand(dh, spd) {
  let vy=JVY, y=0, t=0
  while (y < dh && t < 400) { vy=Math.min(vy+GRAV, MXVY); y+=vy; t++ }
  return t * spd
}

// ── World generation ─────────────────────────────────────────
function gen() {
  const d  = getDiff()
  const rv = d.runLo + (Math.random()*(d.runHi-d.runLo)|0)

  const av = ['gap']
  for (let i=0; i<=d.flatBias; i++) av.push('flat')
  if (gy-110 >= YMIN) av.push('step_up')
  // descend: consolidates old step_down + fall (walk/fall, no jump needed)
  if (gy+70 <= YMAX) { av.push('descend'); if(d.flatBias>0) av.push('descend') }
  // jump_down: only when total void (gap + landing trim) fits within 570px of
  // screen so the landing platform is visible before the player needs to jump.
  // At ~speed 11 this becomes impossible and the type drops out of the pool.
  if (gy+120 <= YMAX) {
    const noJ = fallLand(95, d.speed), fullJ = jumpDownLand(95, d.speed)
    const testGap = noJ + 30
    if (testGap + Math.max(0, fullJ - testGap - LAND_MARGIN) < 570) av.push('jump_down')
  }
  const t = av[Math.random()*av.length|0]

  switch(t) {

    case 'flat': {
      const w = 200+(Math.random()*120|0)
      addP(gx,gy,w,'flat'); gx+=w
      break
    }

    case 'step_up': {
      const sh  = 65+(Math.random()*(d.stepHi-65)|0)
      const gap =  8+(Math.random()*14|0)
      const lw  = d.landLo+(Math.random()*(d.landHi-d.landLo)|0)
      addP(gx,gy,rv,'step_up')
      addS(gx+12, gy-36,'step_up')
      gx+=rv+gap; gy=Math.max(gy-sh,YMIN)
      addP(gx,gy,lw,'step_up'); gx+=lw
      break
    }

    case 'gap': {
      const gw = d.gapLo+(Math.random()*(d.gapHi-d.gapLo)|0)
      const lw = d.landLo+(Math.random()*(d.landHi-d.landLo)|0)
      addP(gx,gy,rv,'gap')
      addS(gx+rv-28, gy-36,'gap')
      gx+=rv+gw; addP(gx,gy,lw,'gap'); gx+=lw
      break
    }

    case 'descend': {
      // Walk or fall off a small gap — no jump required. Full drop range.
      const dh  = 70+(Math.random()*(d.dropHi-70)|0)
      const gap =  6+(Math.random()*18|0)
      const lw  = d.landLo+(Math.random()*(d.landHi-d.landLo)|0)
      addP(gx,gy,rv,'descend')
      addS(gx+rv-50, gy-36,'descend')
      gx+=rv+gap; gy=Math.min(gy+dh,YMAX)
      const trim = Math.max(0, fallLand(dh, d.speed) - gap - LAND_MARGIN)|0
      addP(gx+trim, gy, lw, 'descend'); gx+=trim+lw
      break
    }

    case 'jump_down': {
      // Must jump to clear the gap — landing is lower than the run-up.
      // Gap is just over free-fall reach so any reasonable jump clears it.
      // Drop capped at 120px so landing is always visible in the camera frame.
      const dh      = 70+(Math.random()*50|0)         // 70-120px
      const noJump  = fallLand(dh, d.speed)
      const fullJump = jumpDownLand(dh, d.speed)
      // Gap: 20-55px over the no-jump threshold — requires a jump but forgives timing
      const gw      = (noJump + 20 + (Math.random()*35|0))|0
      const lw      = d.landLo+(Math.random()*(d.landHi-d.landLo)|0)
      addP(gx,gy,rv,'jump_down')
      addS(gx+rv-44, gy-36,'jump_down')
      gx+=rv+gw; gy=Math.min(gy+dh,YMAX)
      // Trim: platform starts where player arrives after full jump
      const trim = Math.max(0, fullJump - gw - LAND_MARGIN)|0
      addP(gx+trim, gy, lw, 'jump_down'); gx+=trim+lw
      break
    }
  }
}

// ── Camera ───────────────────────────────────────────────────
function updateCamera() {
  const centerSY = (pl.y + PLH/2) - camY   // player center in screen coords

  // Dead zone: asymmetric depending on fall state
  const isFalling = pl.vy > 3
  const dzBot = isFalling ? DZ_BOT_FALL : DZ_BOT_IDLE

  let force = 0

  if (centerSY < DZ_TOP) {
    // Player above dead zone — camera moves up
    force += (centerSY - DZ_TOP) * CAM_SPRING
  } else if (centerSY > dzBot) {
    // Player below dead zone — camera moves down
    force += (centerSY - dzBot) * CAM_SPRING
    // Extra urgency when actively falling — reveal landing zone
    if (isFalling) force += (centerSY - dzBot) * CAM_SPRING * 0.55
  }

  // Terrain look-ahead: gently pre-tilt toward upcoming platform height
  let tSum=0, tCnt=0
  for (const p of plats) {
    if (p.x > pl.wx+LOOK_LO && p.x < pl.wx+LOOK_HI) {
      tSum += p.y + PTH/2; tCnt++
    }
  }
  if (tCnt > 0) {
    const avgTY    = tSum/tCnt            // world-Y of upcoming terrain
    const tScreenY = avgTY - camY         // its current screen-Y
    const idealSY  = H * 0.68            // we'd like it in lower third
    force += (tScreenY - idealSY) * LOOK_STR
  }

  camYVel += force
  camYVel *= CAM_DAMP
  camY    += camYVel
}

// ── Input ─────────────────────────────────────────────────────
function doJump() {
  if (pl.on || coyote>0) {
    pl.vy=JVY; pl.on=false; coyote=0; jbuf=0; spawnJumpPfx()
  } else {
    jbuf=6
  }
}
function act() {
  if (mode==='title')  { mode='play'; return }
  if (mode==='dead')   { init(); mode='play'; return }
  doJump()
}
document.addEventListener('keydown', e=>{
  if (['Space','ArrowUp','KeyW'].includes(e.code)) { e.preventDefault(); act() }
})
window.addEventListener('pointerdown', e=>{ e.preventDefault(); act() })

// ── Particles ─────────────────────────────────────────────────
function spawnJumpPfx() {
  for (let i=0;i<8;i++) {
    const a=Math.PI+Math.random()*Math.PI, v=1.5+Math.random()*2.5
    particles.push({x:pl.wx+PLW/2, y:pl.y+PLH,
      vx:Math.cos(a)*v, vy:Math.sin(a)*v-.5, life:22, max:22, r:3, col:'rgba(255,180,80,'})
  }
}
function spawnDeathPfx() {
  for (let i=0;i<22;i++) {
    const a=Math.random()*Math.PI*2, v=1+Math.random()*4
    particles.push({x:pl.wx+PLW/2, y:pl.y+PLH/2,
      vx:Math.cos(a)*v, vy:Math.sin(a)*v-2, life:45, max:45, r:5, col:'rgba(255,80,80,'})
  }
}

// ── Update ────────────────────────────────────────────────────
function update() {
  if (mode!=='play') return
  tick++

  const spd = getDiff().speed
  pl.wx += spd
  camX   = pl.wx-200

  pl.vy  = Math.min(pl.vy+GRAV, MXVY)
  pl.y  += pl.vy

  const was = pl.on; pl.on=false
  for (const p of plats) {
    const sx=p.x-camX
    if (sx+p.w<200 || sx>200+PLW) continue
    const prev=pl.y+PLH-pl.vy
    if (prev<=p.y+1 && pl.y+PLH>=p.y && pl.vy>=0) {
      pl.y=p.y-PLH; pl.vy=0; pl.on=true; lastType=p.t
      lastGroundY = p.y
    }
  }

  // Count successful landings per type (airborne → landed on non-flat)
  if (!was && pl.on && lastType !== 'flat') {
    typeClears[lastType] = (typeClears[lastType]||0) + 1
  }

  if (was&&!pl.on)     coyote=7
  else if (pl.on)      coyote=0
  else if (coyote>0)   coyote--

  if (jbuf>0) { jbuf--; if(pl.on||coyote>0) doJump() }

  updateCamera()

  score = scoreBase + (pl.wx/60|0)
  if (score > best) best = score

  // Death: fell too far below the last platform (350px clears max fall segment of 300px,
  // but triggers almost immediately if the player misses the landing platform)
  if (pl.y - lastGroundY > 350) { spawnDeathPfx(); mode='dead'; return }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-- })
  particles=particles.filter(p=>p.life>0)

  while (gx-camX < W*3) gen()
  const cut=camX-400
  plats = plats.filter(p=>p.x+p.w>cut)
  signs = signs.filter(s=>s.x>cut)
  zones = zones.filter(z=>z.x+z.w>cut && z.y+z.h>camY-200)
}

// ── Draw ──────────────────────────────────────────────────────
function drawBg() {
  // Sky darkens and very slightly reddens with difficulty
  const heat = getDiff().colorFade * 0.08
  const g=cx.createLinearGradient(0,0,0,H)
  g.addColorStop(0, `rgb(${4+heat*30|0},4,${15+heat*4|0})`)
  g.addColorStop(1, `rgb(${8+heat*20|0},8,${32+heat*4|0})`)
  cx.fillStyle=g; cx.fillRect(0,0,W,H)

  // Stars with both horizontal AND vertical parallax
  for (let layer=0;layer<3;layer++) {
    const hs=0.05+layer*0.07, vs=0.03+layer*0.05
    const hoff=(camX*hs)|0, voff=(camY*vs)|0
    cx.fillStyle=`rgba(255,255,255,${.30+layer*.15})`
    const n=30+layer*25
    for (let i=0;i<n;i++) {
      const sx=((i*(997+layer*333)+hoff)%W+W)%W
      const sy=((i*(421+layer*211)+i*7+voff)%H+H)%H
      cx.fillRect(sx,sy,layer===2&&i%7===0?2:1,layer===2&&i%7===0?2:1)
    }
  }
}

function drawZones() {}  // removed — zones kept in world state for gen() logic, not drawn

function drawPlats() {
  const cf = getDiff().colorFade
  for (const p of plats) {
    const sx=p.x-camX|0, sy=p.y-camY|0
    if (sx+p.w<0||sx>W||sy+PTH<-4||sy>H+4) continue
    const c   = COL[p.t]
    const bRgb = hexRgb(c.b)
    const sRgb = hexRgb(c.s)

    cx.fillStyle='rgba(0,0,0,0.32)'; cx.fillRect(sx+4,sy+5,p.w,PTH)  // shadow

    // Exact lerp → at cf=1 every type converges to the identical neutral pixel
    cx.fillStyle=lerpCol(bRgb, NEUTRAL_B, cf); cx.fillRect(sx,sy,p.w,PTH)
    cx.fillStyle=lerpCol(sRgb, NEUTRAL_S, cf); cx.fillRect(sx,sy,p.w,5)

    cx.fillStyle='rgba(0,0,0,0.22)'; cx.fillRect(sx,sy+PTH/2|0,p.w,1)
    cx.fillStyle='rgba(0,0,0,0.18)'
    const bw=30
    for (let bx=sx%bw;bx<p.w;bx+=bw) cx.fillRect(sx+bx,sy+5,1,PTH-5)
    for (let bx=(sx+bw/2)%bw;bx<p.w;bx+=bw) cx.fillRect(sx+bx,sy+5,1,PTH/2-5|0)
    const dist=Math.abs(sx-200)
    if (dist<300) {
      cx.globalAlpha=Math.max(0,(300-dist)/300)*.10
      cx.fillStyle=lerpCol(sRgb, NEUTRAL_S, cf); cx.fillRect(sx,sy,p.w,PTH)
      cx.globalAlpha=1
    }
  }
}

function drawSigns() {
  cx.font='bold 33px "Courier New",monospace'
  for (const s of signs) {
    if (!showLabel(s.t)) continue
    const sx=s.x-camX|0, sy=s.y-camY|0
    if (sx<-80||sx>W+80||sy<-40||sy>H+20) continue
    const c=COL[s.t]
    const a = 1 - getDiff().colorFade * 0.5
    const tw=cx.measureText(s.s).width+12
    cx.globalAlpha=a
    cx.fillStyle='rgba(0,0,0,0.60)'; cx.fillRect(sx-4,sy-27,tw,32)
    cx.fillStyle=c.t; cx.fillText(s.s,sx+3,sy)
    cx.globalAlpha=1
  }
}

function drawParticles() {
  for (const p of particles) {
    const sx=p.x-camX, sy=p.y-camY, a=p.life/p.max, r=p.r*a
    cx.fillStyle=p.col+a+')'
    cx.fillRect(sx-r,sy-r,r*2,r*2)
  }
}

function drawPlayer() {
  const sx=200, sy=(pl.y-camY)|0, air=!pl.on
  cx.fillStyle='rgba(0,0,0,0.22)'; cx.fillRect(sx+4,sy+PLH+1,PLW-2,4)
  cx.fillStyle=air?'#ff7060':'#e84848'; cx.fillRect(sx,sy,PLW,PLH)
  cx.fillStyle='rgba(255,255,255,0.22)'; cx.fillRect(sx,sy,4,PLH)
  cx.fillStyle='rgba(255,255,255,0.28)'; cx.fillRect(sx,sy,PLW,5)
  cx.fillStyle='#0c0618'; cx.fillRect(sx+11,sy+7,10,10)
  cx.fillStyle='#fff';    cx.fillRect(sx+13,sy+9,6,6)
  cx.fillStyle='#0a0514'; cx.fillRect(sx+16+(air?1:0),sy+11,2,3)
  cx.fillStyle='#b03030'
  if (pl.on) {
    const lk=Math.sin(tick*.38)*5|0
    cx.fillRect(sx+3,sy+PLH,8,8+lk); cx.fillRect(sx+PLW-11,sy+PLH,8,8-lk)
  } else {
    cx.fillRect(sx+3,sy+PLH,8,5); cx.fillRect(sx+PLW-11,sy+PLH,8,5)
  }
  cx.strokeStyle='rgba(0,0,0,0.5)'; cx.lineWidth=3
  cx.strokeRect(sx+1,sy+1,PLW-2,PLH-2)
}

// (camera debug strip removed)

function drawHUD() {
  if (mode!=='play') return

  // Score / best — 3x font size
  cx.font='bold 22px "Courier New",monospace'
  cx.fillStyle='rgba(255,255,255,0.90)'; cx.fillText('DIST '+String(score).padStart(5,'0'),14,28)
  if (best>0) { cx.fillStyle='#e8c030'; cx.fillText('BEST '+String(best).padStart(5,'0'),14,54) }

  // Speed heat bar — top right
  const d=getDiff()
  const spd_t=(d.speed-4)/10   // normalized over full range 4→14
  const barW=150, barH=16, bx=W-barW-20, by=18
  cx.fillStyle='rgba(0,0,0,0.50)'; cx.fillRect(bx-3,by-3,barW+6,barH+6)
  const bg=cx.createLinearGradient(bx,0,bx+barW,0)
  bg.addColorStop(0,'#30c040'); bg.addColorStop(0.5,'#d0c020'); bg.addColorStop(1,'#e03030')
  cx.fillStyle=bg; cx.fillRect(bx,by,barW*spd_t,barH)
  cx.strokeStyle='rgba(255,255,255,0.20)'; cx.lineWidth=3
  cx.strokeRect(bx,by,barW,barH)
}

function overlay(rows) {
  cx.fillStyle='rgba(3,3,14,0.90)'; cx.fillRect(0,0,W,H)
  let y=H/2-rows.reduce((a,r)=>a+(r.gap||108),0)/2
  cx.textAlign='center'
  for (const r of rows) {
    cx.font=r.font||'48px "Courier New",monospace'; cx.fillStyle=r.c||'#fff'
    if(r.pulse) cx.globalAlpha=.6+.4*Math.sin(Date.now()/380)
    cx.fillText(r.text,W/2,y); cx.globalAlpha=1; y+=r.gap||108
  }
  cx.textAlign='left'
}

function drawTitle() {
  overlay([
    {text:'▣ ONE BUTTON PLATFORMER',font:'bold 66px "Courier New",monospace',c:'#ff6060',gap:96},
    {text:'auto-run  ·  tap to jump',font:'36px "Courier New",monospace',c:'#6688bb',gap:58},
    {text:'▲ up  ▶▶ gap  ▼ down  ⬇ fall',font:'bold 30px "Courier New",monospace',c:'#8899aa',gap:88},
    {text:'TAP  to start',font:'bold 54px "Courier New",monospace',c:'#fff',pulse:true},
  ])
}
function drawDead() {
  overlay([
    {text:'YOU FELL',font:'bold 96px "Courier New",monospace',c:'#ff4040',gap:118},
    {text:'dist  '+String(score).padStart(5,'0'),font:'42px "Courier New",monospace',c:'#fff',gap:56},
    {text:'best  '+String(best).padStart(5,'0'),font:'36px "Courier New",monospace',c:'#e8c030',gap:88},
    {text:'TAP  to retry',font:'bold 48px "Courier New",monospace',c:'#fff',pulse:true},
  ])
}

// ── Main loop ─────────────────────────────────────────────────
// Gate physics to 60fps regardless of display refresh rate.
// On 120Hz ProMotion screens rAF fires every ~8ms; without this,
// speed, gravity and all time-based values run at 2×.
const FRAME_MS = 1000 / 60
let lastFrameTime = 0

function loop(ts) {
  requestAnimationFrame(loop)
  if (ts - lastFrameTime < FRAME_MS - 1) return
  lastFrameTime = ts
  update()
  // Draw everything in logical 800×440 game space; canvas is CW×CH (1/3 res),
  // so each "game pixel" covers 3×3 canvas pixels → chunky retro look.
  cx.save()
  cx.scale(CW/W, CH/H)
  drawBg(); drawZones(); drawPlats(); drawSigns()
  drawParticles()
  if (mode==='play'||mode==='dead') drawPlayer()
  drawHUD()
  if (mode==='title') drawTitle()
  if (mode==='dead')  drawDead()
  cx.restore()
}

init(); requestAnimationFrame(loop)
</script>
